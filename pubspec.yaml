name: ticketing_flutter
description: JTL IT Ticketing System – Flutter App (Admin + Portal)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # HTTP client
  dio: ^5.4.3

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Date / time formatting
  intl: ^0.19.0
  timeago: ^3.6.1

  # Charts (dashboard)
  fl_chart: ^0.68.0

  # Image caching
  cached_network_image: ^3.3.1

  # Loading skeletons
  shimmer: ^3.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
